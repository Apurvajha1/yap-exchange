<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Panel - Yap Exchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body style="background: #110000;"> <div class="glass-header">
        <div class="logo">BOSS<span>PANEL</span></div>
        <button class="outline-btn" onclick="window.location.href='/'">BACK TO CASINO</button>
    </div>

    <main style="padding: 2rem; max-width: 800px; margin: 0 auto;">
        <h2 class="cyber-heading" style="color: var(--danger-red);">ACTIVE TARGETS (AWAITING JUDGMENT)</h2>
        <div id="admin-targets" style="display: flex; flex-direction: column; gap: 1rem;">
            </div>
    </main>

    <script>
        async function loadAdminBoard() {
            const res = await fetch('/api/targets');
            const targets = await res.json();
            const container = document.getElementById('admin-targets');
            container.innerHTML = '';

            targets.forEach(t => {
                const card = document.createElement('div');
                card.className = 'glass-panel';
                card.style.borderColor = 'var(--danger-red)';

                let buttons = '';
                for (const dur in t.odds) {
                    buttons += `<button class="neon-btn danger-btn" style="padding: 0.5rem; font-size:0.8rem;" onclick="resolveBounty('${t.name}', '${dur}')">MUTED: ${dur}</button>`;
                }

                card.innerHTML = `
                    <h3 style="margin-top:0;">🎯 ${t.name}</h3>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        ${buttons}
                        <button class="outline-btn" style="border-color: yellow; color: yellow; margin-left: auto;" onclick="resolveBounty('${t.name}', 'REFUND')">FALSE ALARM (REFUND)</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function resolveBounty(targetName, winningDuration) {
            if(!confirm(`Trigger payouts for: ${targetName} (${winningDuration})?`)) return;

            const res = await fetch('/api/admin/resolve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target_name: targetName, duration: winningDuration})
            });

            if (res.ok) {
                alert("Judgment Delivered!");
                loadAdminBoard();
            } else {
                alert("Error delivering judgment.");
            }
        }

        // Load the board when the page opens
        loadAdminBoard();
    </script>
</body>
</html>
